<svg viewBox="0 0 840 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trail ingest pipeline: source through extract, chunk, propose_candidate, queue, policy_check, branching to auto_approve or curator_review, then compile_to_neuron and emit_neuron_event">
  <!-- Punch-card header strip (notches top-left, column of holes) -->
  <g fill="none" stroke="currentColor" stroke-width="0.9" opacity="0.65">
    <!-- cut corner -->
    <polyline points="20,50 45,25 820,25 820,60 20,60 20,50" />
  </g>
  <!-- Column of "holes" along the header strip -->
  <g fill="currentColor" opacity="0.55">
    <rect x="75"  y="36" width="10" height="14"/>
    <rect x="105" y="36" width="10" height="14"/>
    <rect x="135" y="36" width="10" height="14"/>
    <rect x="165" y="36" width="10" height="14"/>
    <rect x="195" y="36" width="10" height="14"/>
    <rect x="225" y="36" width="10" height="14"/>
    <rect x="255" y="36" width="10" height="14"/>
    <rect x="285" y="36" width="10" height="14"/>
    <rect x="315" y="36" width="10" height="14"/>
    <rect x="345" y="36" width="10" height="14"/>
    <rect x="375" y="36" width="10" height="14"/>
    <rect x="405" y="36" width="10" height="14"/>
    <rect x="435" y="36" width="10" height="14"/>
  </g>
  <!-- Header card label -->
  <text x="780" y="47" font-family="monospace" font-size="11" fill="currentColor" text-anchor="end" opacity="0.7" letter-spacing="1">TRAIL · INGEST PIPELINE</text>
  <!-- Section caption -->
  <text x="420" y="88" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">SOURCES → NEURONS, AT COMPILE TIME</text>

  <!-- Pipeline step definitions (3 rows of boxes) -->
  <!-- Row 1 y=130 -->
  <g font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle">
    <!-- source -->
    <rect x="50"  y="125" width="130" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="115" y="156">source</text>
    <!-- extract -->
    <rect x="220" y="125" width="130" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="285" y="156">extract</text>
    <!-- chunk -->
    <rect x="390" y="125" width="130" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="455" y="156">chunk</text>
    <!-- propose_candidate -->
    <rect x="560" y="125" width="230" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="675" y="156">propose_candidate</text>
  </g>
  <!-- Parameter annotation for propose_candidate -->
  <g font-family="monospace" font-size="11" fill="currentColor" opacity="0.6" text-anchor="middle">
    <text x="675" y="113">( kind, payload, confidence )</text>
  </g>
  <g stroke="currentColor" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.5">
    <line x1="675" y1="118" x2="675" y2="125"/>
  </g>

  <!-- Arrows row 1 -->
  <g stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="180" y1="150" x2="216" y2="150"/>
    <polygon points="218,150 210,146 210,154" fill="currentColor"/>
    <line x1="350" y1="150" x2="386" y2="150"/>
    <polygon points="388,150 380,146 380,154" fill="currentColor"/>
    <line x1="520" y1="150" x2="556" y2="150"/>
    <polygon points="558,150 550,146 550,154" fill="currentColor"/>
  </g>

  <!-- Connector down from row 1 → row 2 -->
  <g stroke="currentColor" stroke-width="1" opacity="0.7" fill="none">
    <path d="M 675 175 L 675 200 L 115 200 L 115 225"/>
    <polygon points="115,228 111,220 119,220" fill="currentColor"/>
  </g>

  <!-- Row 2 y=235 -->
  <g font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle">
    <rect x="50"  y="230" width="130" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="115" y="261">queue</text>
    <rect x="220" y="230" width="190" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="315" y="261">policy_check</text>
  </g>
  <!-- Arrow queue → policy -->
  <g stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="180" y1="255" x2="216" y2="255"/>
    <polygon points="218,255 210,251 210,259" fill="currentColor"/>
  </g>

  <!-- Branch diamond after policy_check -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <polygon points="460,255 500,225 540,255 500,285"/>
  </g>
  <text x="500" y="259" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle">branch</text>
  <!-- Arrow policy → diamond -->
  <g stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="410" y1="255" x2="456" y2="255"/>
    <polygon points="458,255 450,251 450,259" fill="currentColor"/>
  </g>

  <!-- Branch labels (amber for auto, muted for curator) -->
  <g font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle">
    <!-- auto_approve (amber path) -->
    <rect x="580" y="200" width="200" height="50" fill="none" stroke="#e8a87c" stroke-width="1.6"/>
    <text x="680" y="231" fill="#e8a87c">auto_approve</text>
    <!-- curator_review (muted) -->
    <rect x="580" y="260" width="200" height="50" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="680" y="291" opacity="0.75">curator_review</text>
  </g>
  <!-- Branch connectors -->
  <g fill="none">
    <!-- diamond right → auto_approve (amber, up-right) -->
    <line x1="540" y1="247" x2="578" y2="227" stroke="#e8a87c" stroke-width="1.5"/>
    <polygon points="582,225 572,222 574,232" fill="#e8a87c"/>
    <!-- diamond right → curator_review (muted, down-right) -->
    <line x1="540" y1="263" x2="578" y2="283" stroke="currentColor" stroke-width="0.9" opacity="0.55" stroke-dasharray="4,3"/>
    <polygon points="582,285 572,278 574,288" fill="currentColor" opacity="0.55"/>
  </g>

  <!-- Connector amber down to row 3 -->
  <g fill="none" stroke="#e8a87c" stroke-width="1.5">
    <path d="M 680 250 L 680 335 L 250 335 L 250 360"/>
  </g>
  <polygon points="250,363 246,355 254,355" fill="#e8a87c"/>
  <!-- curator loop back (muted) -->
  <g fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3">
    <path d="M 680 310 Q 800 370 420 380 Q 250 385 250 360"/>
  </g>
  <text x="520" y="354" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.45">human approves and re-enters</text>

  <!-- Row 3 y=370 -->
  <g font-family="monospace" font-size="14" fill="#e8a87c" text-anchor="middle">
    <rect x="50"  y="365" width="400" height="50" fill="none" stroke="#e8a87c" stroke-width="1.6"/>
    <text x="250" y="396">compile_to_neuron</text>
  </g>
  <g font-family="monospace" font-size="11" fill="currentColor" opacity="0.6" text-anchor="middle">
    <text x="250" y="436">( touches 5–15 Neurons · resolves cross-refs )</text>
  </g>
  <g stroke="currentColor" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.5">
    <line x1="250" y1="420" x2="250" y2="425"/>
  </g>

  <!-- Arrow compile → emit -->
  <g stroke="#e8a87c" stroke-width="1.5">
    <line x1="450" y1="390" x2="496" y2="390"/>
    <polygon points="498,390 490,386 490,394" fill="#e8a87c"/>
  </g>

  <g font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle">
    <rect x="500" y="365" width="290" height="50" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <text x="645" y="396">emit_neuron_event</text>
  </g>
  <g font-family="monospace" font-size="11" fill="currentColor" opacity="0.6" text-anchor="middle">
    <text x="645" y="436">( payload, prev_event_id )</text>
  </g>
  <g stroke="currentColor" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.5">
    <line x1="645" y1="420" x2="645" y2="425"/>
  </g>

  <!-- Footer: hole column + caption -->
  <g fill="currentColor" opacity="0.35">
    <rect x="75"  y="500" width="8" height="12"/>
    <rect x="100" y="500" width="8" height="12"/>
    <rect x="125" y="500" width="8" height="12"/>
    <rect x="150" y="500" width="8" height="12"/>
    <rect x="175" y="500" width="8" height="12"/>
    <rect x="200" y="500" width="8" height="12"/>
    <rect x="225" y="500" width="8" height="12"/>
    <rect x="250" y="500" width="8" height="12"/>
    <rect x="275" y="500" width="8" height="12"/>
    <rect x="300" y="500" width="8" height="12"/>
  </g>
  <text x="420" y="540" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.5" letter-spacing="0.5">every candidate runs this path · Neurons only appear after all nine steps</text>
</svg>

<svg viewBox="0 0 840 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A 2x2 matrix for choosing between RAG and Trail based on whether the knowledge should accumulate and whether a persistent artifact is wanted">
  <!-- Title -->
  <text x="420" y="45" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">WHEN TO PICK WHICH</text>

  <!-- Matrix axes -->
  <!-- vertical axis label (rotated left) -->
  <text x="60" y="270" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="0.5" transform="rotate(-90 60 270)">KNOWLEDGE ACCUMULATES</text>

  <!-- horizontal axis label (bottom) -->
  <text x="470" y="500" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="0.5">PERSISTENT ARTIFACT WANTED</text>

  <!-- Matrix frame -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="120" y="90" width="700" height="380"/>
    <line x1="120" y1="280" x2="820" y2="280"/>
    <line x1="470" y1="90"  x2="470" y2="470"/>
  </g>

  <!-- Axis tick labels -->
  <g font-family="monospace" font-size="12" fill="currentColor" opacity="0.7" text-anchor="middle">
    <text x="90"  y="185">YES</text>
    <text x="90"  y="380">NO</text>
    <text x="295" y="485">NO</text>
    <text x="645" y="485">YES</text>
  </g>

  <!-- Top-right: TRAIL (amber fill + halo) -->
  <rect x="485" y="105" width="320" height="160" fill="#e8a87c" opacity="0.12"/>
  <g font-family="monospace" text-anchor="middle">
    <text x="645" y="165" font-size="22" fill="#e8a87c" font-weight="bold" letter-spacing="2">TRAIL</text>
    <text x="645" y="195" font-size="13" fill="currentColor" opacity="0.75">clinical knowledge · research</text>
    <text x="645" y="212" font-size="13" fill="currentColor" opacity="0.75">org-wide docs · ops playbooks</text>
    <text x="645" y="238" font-size="12" fill="currentColor" opacity="0.55">source-grounded · persistent</text>
    <text x="645" y="253" font-size="12" fill="currentColor" opacity="0.55">the Neuron graph grows with use</text>
  </g>

  <!-- Top-left: "compile without persistent artifact" edge case -->
  <g font-family="monospace" text-anchor="middle">
    <text x="295" y="170" font-size="14" fill="currentColor" opacity="0.55" letter-spacing="0.5">SESSION TOOLS</text>
    <text x="295" y="195" font-size="12" fill="currentColor" opacity="0.4">e.g. NotebookLM</text>
    <text x="295" y="225" font-size="11" fill="currentColor" opacity="0.4">accumulates within a session</text>
    <text x="295" y="240" font-size="11" fill="currentColor" opacity="0.4">but the artifact is thrown away</text>
  </g>

  <!-- Bottom-right: "persist, but don't compound" — structured doc store -->
  <g font-family="monospace" text-anchor="middle">
    <text x="645" y="355" font-size="14" fill="currentColor" opacity="0.55" letter-spacing="0.5">STATIC DOC STORE</text>
    <text x="645" y="380" font-size="12" fill="currentColor" opacity="0.4">read the source as-is</text>
    <text x="645" y="405" font-size="11" fill="currentColor" opacity="0.4">the sources are the answer</text>
    <text x="645" y="420" font-size="11" fill="currentColor" opacity="0.4">nothing needs synthesizing</text>
  </g>

  <!-- Bottom-left: RAG -->
  <g font-family="monospace" text-anchor="middle">
    <text x="295" y="365" font-size="22" fill="currentColor" font-weight="bold" letter-spacing="2">RAG</text>
    <text x="295" y="395" font-size="13" fill="currentColor" opacity="0.75">customer-support chat</text>
    <text x="295" y="412" font-size="13" fill="currentColor" opacity="0.75">product-doc Q&amp;A</text>
    <text x="295" y="438" font-size="12" fill="currentColor" opacity="0.55">bounded corpus · Q&amp;A style</text>
    <text x="295" y="453" font-size="12" fill="currentColor" opacity="0.55">each query independent</text>
  </g>

  <!-- caption -->
  <!-- (axis labels are the caption) -->
</svg>

<svg viewBox="0 0 840 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison of biological memory processes with Trail's compile-time architecture and RAG's retrieval-time architecture across seven cognitive functions">
  <!-- Title -->
  <text x="420" y="42" font-family="monospace" font-size="16" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">HOW THE BRAIN REMEMBERS · TRAIL · RAG</text>

  <!-- Column headers -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="95"  font-size="20" font-weight="bold" letter-spacing="1">BIOLOGICAL</text>
    <text x="160" y="118" font-size="14" opacity="0.55">what the brain does</text>
    <text x="440" y="95"  font-size="20" font-weight="bold" letter-spacing="1" fill="#e8a87c">TRAIL</text>
    <text x="440" y="118" font-size="14" opacity="0.55">compile-time</text>
    <text x="690" y="95"  font-size="20" font-weight="bold" letter-spacing="1">RAG</text>
    <text x="690" y="118" font-size="14" opacity="0.55">retrieve-time</text>
  </g>

  <!-- Header underline -->
  <line x1="40" y1="140" x2="800" y2="140" stroke="currentColor" stroke-width="1" opacity="0.55"/>

  <!-- Column dividers -->
  <g stroke="currentColor" stroke-width="0.5" opacity="0.18">
    <line x1="300" y1="140" x2="300" y2="710"/>
    <line x1="570" y1="140" x2="570" y2="710"/>
  </g>

  <!-- Row 1: Ingestion -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="185" font-size="18">Hippocampus encodes</text>
    <text x="160" y="207" font-size="18">new experience</text>
    <text x="440" y="197" font-size="18">Source ingestion</text>
    <text x="690" y="197" font-size="18">Document ingestion</text>
  </g>
  <line x1="40" y1="235" x2="800" y2="235" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 2: Consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="265" font-size="18">Consolidation transfers</text>
    <text x="160" y="287" font-size="18">knowledge to neocortex</text>
    <text x="440" y="265" font-size="18">Compile step writes</text>
    <text x="440" y="287" font-size="18">or updates Neurons</text>
    <text x="690" y="276" font-size="18" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="315" x2="800" y2="315" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 3: Long-term store -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="345" font-size="18">Neocortex stores</text>
    <text x="160" y="367" font-size="18">integrated knowledge</text>
    <text x="440" y="356" font-size="18">Neurons</text>
    <text x="690" y="356" font-size="18" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="395" x2="800" y2="395" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 4: Recall -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="425" font-size="18">Recall activates</text>
    <text x="160" y="447" font-size="18">an existing pattern</text>
    <text x="440" y="436" font-size="18">Read the Neuron</text>
    <text x="690" y="425" font-size="18" font-style="italic" opacity="0.6">Reconstruct from</text>
    <text x="690" y="447" font-size="18" font-style="italic" opacity="0.6">scratch every query</text>
  </g>
  <line x1="40" y1="475" x2="800" y2="475" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 5: Spreading activation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="505" font-size="18">Spreading activation</text>
    <text x="160" y="527" font-size="18">finds related items</text>
    <text x="440" y="516" font-size="18">Follow Neuron links</text>
    <text x="690" y="505" font-size="18">Vector similarity</text>
    <text x="690" y="527" font-size="16" opacity="0.6">(weak parallel)</text>
  </g>
  <line x1="40" y1="555" x2="800" y2="555" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 6: Sleep consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="585" font-size="18">Sleep consolidates</text>
    <text x="160" y="607" font-size="18">the day's learning</text>
    <text x="440" y="596" font-size="18">Background lint pass</text>
    <text x="690" y="596" font-size="18" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="635" x2="800" y2="635" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 7: Forgetting -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="665" font-size="18">Forgetting prunes</text>
    <text x="160" y="687" font-size="18">the irrelevant</text>
    <text x="440" y="676" font-size="18">Stale-Neuron detection</text>
    <text x="690" y="676" font-size="18" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>

  <!-- Bottom sub-caption -->
  <text x="420" y="735" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.5" letter-spacing="0.5">seven things a brain does · Trail does six · RAG does one</text>
</svg>

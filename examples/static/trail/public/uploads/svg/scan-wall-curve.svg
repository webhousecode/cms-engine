<svg viewBox="0 20 920 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contradiction-scan wall-clock time grows with corpus size, crossing the 24h scheduling window around N=8000 Neurons; sampling holds the line flat.">
  <text x="460" y="45" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">WHERE THE SCAN HITS THE WALL</text>

  <!-- Axes -->
  <line x1="80" y1="340" x2="820" y2="340" stroke="currentColor" stroke-width="1.2"/>
  <line x1="80" y1="90"  x2="80"  y2="340" stroke="currentColor" stroke-width="1.2"/>

  <!-- Y axis label -->
  <text x="32" y="95"  font-family="monospace" font-size="9" fill="currentColor" opacity="0.7">full-pass</text>
  <text x="32" y="107" font-family="monospace" font-size="9" fill="currentColor" opacity="0.7">hours</text>

  <!-- X axis label -->
  <text x="460" y="380" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">NEURONS IN CORPUS</text>

  <!-- Y ticks: 0, 8h, 16h, 24h, 32h -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.5">
    <line x1="75" y1="340" x2="80" y2="340"/>
    <line x1="75" y1="280" x2="80" y2="280"/>
    <line x1="75" y1="220" x2="80" y2="220"/>
    <line x1="75" y1="160" x2="80" y2="160"/>
    <line x1="75" y1="100" x2="80" y2="100"/>
  </g>
  <g font-family="monospace" font-size="8" fill="currentColor" opacity="0.55" text-anchor="end">
    <text x="72" y="343">0</text>
    <text x="72" y="283">8h</text>
    <text x="72" y="223">16h</text>
    <text x="72" y="163">24h</text>
    <text x="72" y="103">32h</text>
  </g>

  <!-- X ticks: 0, 2k, 4k, 6k, 8k, 10k -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.5">
    <line x1="80"  y1="340" x2="80"  y2="345"/>
    <line x1="228" y1="340" x2="228" y2="345"/>
    <line x1="376" y1="340" x2="376" y2="345"/>
    <line x1="524" y1="340" x2="524" y2="345"/>
    <line x1="672" y1="340" x2="672" y2="345"/>
    <line x1="820" y1="340" x2="820" y2="345"/>
  </g>
  <g font-family="monospace" font-size="8" fill="currentColor" opacity="0.55" text-anchor="middle">
    <text x="80"  y="358">0</text>
    <text x="228" y="358">2k</text>
    <text x="376" y="358">4k</text>
    <text x="524" y="358">6k</text>
    <text x="672" y="358">8k</text>
    <text x="820" y="358">10k</text>
  </g>

  <!-- 24h wall -->
  <line x1="80" y1="160" x2="820" y2="160" stroke="currentColor" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="816" y="155" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.65">24h scheduling window</text>

  <!-- Sequential curve: rises linearly at ~7.5s per Neuron → at N=8000 hits 24h (y=160). Use a slightly super-linear shape. -->
  <path d="M 80 340 L 228 320 L 376 285 L 524 235 L 672 160 L 820 90" fill="none" stroke="currentColor" stroke-width="1.6"/>
  <text x="830" y="90" font-family="monospace" font-size="9" fill="currentColor" text-anchor="start" font-weight="bold">naive</text>
  <text x="830" y="102" font-family="monospace" font-size="8" fill="currentColor" text-anchor="start" opacity="0.55">O(N·K) sequential</text>

  <!-- Crossing point marker: N=8k, 24h -->
  <line x1="672" y1="340" x2="672" y2="160" stroke="currentColor" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.5"/>
  <circle cx="672" cy="160" r="3.5" fill="currentColor"/>
  <text x="672" y="148" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.75">wall hit</text>

  <!-- Sampled flat line at ~1h -->
  <line x1="80" y1="332" x2="820" y2="332" stroke="#e8a87c" stroke-width="1.8"/>
  <text x="830" y="334" font-family="monospace" font-size="9" fill="#e8a87c" text-anchor="start" font-weight="bold">sampled</text>
  <text x="830" y="346" font-family="monospace" font-size="8" fill="#e8a87c" text-anchor="start" opacity="0.9">cap=500/pass</text>

  <!-- Annotation: overflow zone -->
  <path d="M 672 160 L 820 160 L 820 90 L 672 90 Z" fill="currentColor" opacity="0.06"/>
  <text x="746" y="128" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.55">passes stack up</text>

  <!-- Caption bottom -->
  <text x="460" y="412" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" opacity="0.4">at N≈8000 a sequential full pass no longer finishes before the next one starts; sampling flattens the curve</text>
</svg>

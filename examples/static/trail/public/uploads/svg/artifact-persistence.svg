<svg viewBox="0 0 840 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Time diagram: three NotebookLM sessions each produce a notebook that fades after the session ends, while one Trail compile writes a persistent Neuron that accumulates links with each new source">
  <!-- Title -->
  <text x="420" y="42" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">WHAT REMAINS AFTER THE SESSION ENDS</text>

  <!-- Horizontal timeline axis -->
  <line x1="60" y1="240" x2="790" y2="240" stroke="currentColor" stroke-width="0.6" opacity="0.35" stroke-dasharray="4,4"/>
  <text x="425" y="420" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" letter-spacing="0.5">TIME →</text>

  <!-- ========== NotebookLM row (top) ========== -->
  <text x="60"  y="90" font-family="monospace" font-size="16" fill="currentColor" font-weight="bold" letter-spacing="0.5">NOTEBOOKLM</text>
  <text x="60"  y="108" font-family="monospace" font-size="12" fill="currentColor" opacity="0.55">each session is a new start</text>

  <!-- 3 notebook blocks fading out -->
  <g>
    <!-- session 1 -->
    <g opacity="1">
      <rect x="150" y="130" width="120" height="80" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
        <line x1="165" y1="150" x2="255" y2="150"/>
        <line x1="165" y1="165" x2="250" y2="165"/>
        <line x1="165" y1="180" x2="255" y2="180"/>
        <line x1="165" y1="195" x2="245" y2="195"/>
      </g>
      <text x="210" y="230" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">session 1</text>
    </g>
    <!-- fade arrow to nothing -->
    <g stroke="currentColor" stroke-width="0.6" opacity="0.35" stroke-dasharray="3,3" fill="none">
      <path d="M 270 180 Q 310 200 350 240"/>
    </g>
    <text x="305" y="212" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" opacity="0.4">discard</text>

    <!-- session 2 (dimmer) -->
    <g opacity="0.6">
      <rect x="370" y="130" width="120" height="80" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
        <line x1="385" y1="150" x2="475" y2="150"/>
        <line x1="385" y1="165" x2="470" y2="165"/>
        <line x1="385" y1="180" x2="475" y2="180"/>
      </g>
      <text x="430" y="230" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle">session 2</text>
    </g>
    <g stroke="currentColor" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3" fill="none">
      <path d="M 490 180 Q 530 200 570 240"/>
    </g>

    <!-- session 3 (even dimmer) -->
    <g opacity="0.35">
      <rect x="590" y="130" width="120" height="80" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
        <line x1="605" y1="150" x2="695" y2="150"/>
        <line x1="605" y1="165" x2="690" y2="165"/>
      </g>
      <text x="650" y="230" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle">session 3</text>
    </g>
  </g>

  <!-- ========== Trail row (bottom) ========== -->
  <text x="60"  y="290" font-family="monospace" font-size="16" fill="#e8a87c" font-weight="bold" letter-spacing="0.5">TRAIL</text>
  <text x="60"  y="308" font-family="monospace" font-size="12" fill="currentColor" opacity="0.55">one Neuron, growing with use</text>

  <!-- Single persistent Neuron that gains edges over time -->
  <!-- The neuron itself -->
  <circle cx="210" cy="360" r="12" fill="#e8a87c"/>
  <circle cx="210" cy="360" r="20" fill="none" stroke="#e8a87c" stroke-width="0.6" opacity="0.5"/>
  <circle cx="210" cy="360" r="30" fill="none" stroke="#e8a87c" stroke-width="0.4" opacity="0.3"/>
  <text x="210" y="394" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">t0 · written</text>

  <!-- adjacent Neurons added over time -->
  <circle cx="400" cy="340" r="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <line x1="222" y1="358" x2="392" y2="342" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="400" y="320" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">t1 · link added</text>

  <circle cx="560" cy="380" r="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <line x1="222" y1="362" x2="552" y2="378" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="560" y="404" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">t2 · link added</text>

  <circle cx="700" cy="340" r="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <line x1="220" y1="356" x2="692" y2="342" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="700" y="320" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">t3 · link added</text>

  <!-- divider line between the two rows -->
  <line x1="40" y1="250" x2="800" y2="250" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
</svg>

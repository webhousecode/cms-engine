<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle ?: 'Java Spring Blog'} + ' — @webhouse/cms'">@webhouse/cms</title>
    <style>
        :root {
            --gold: #F7BB2E;
            --dark: #0D0D0D;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: #222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.7;
            max-width: 740px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }
        nav .brand {
            font-family: monospace;
            color: var(--gold);
            font-weight: 600;
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.85rem;
        }
        nav a:hover { color: var(--gold); }
        h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        h2 { font-size: 1.4rem; color: #fff; margin: 2rem 0 1rem; }
        p { margin-bottom: 1rem; }
        a { color: var(--gold); }
        .post-card {
            display: block;
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            text-decoration: none;
            transition: border-color 0.2s;
        }
        .post-card:hover { border-color: var(--gold); }
        .post-card h3 { color: #fff; margin-bottom: 0.4rem; }
        .post-card .meta { color: var(--text-dim); font-size: 0.8rem; font-family: monospace; }
        .meta { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 2rem; }
        pre, code {
            font-family: 'JetBrains Mono', monospace;
            background: #111;
            color: var(--gold);
        }
        pre { padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
        code { padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
        pre code { padding: 0; background: transparent; color: var(--text); }
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">@webhouse/cms · Java Spring Blog</a>
        <div>
            <a href="/">EN</a>
            <a href="/da/">DA</a>
        </div>
    </nav>

    <div layout:fragment="content">
        <!-- replaced per page -->
    </div>

    <footer>
        Powered by @webhouse/cms — read by Spring Boot 3.4 / Java 21
    </footer>
</body>
</html>

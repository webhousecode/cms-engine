name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check cms
        run: cd packages/cms && npx tsc --noEmit

      - name: Type-check cms-admin
        run: npx tsc --noEmit --project packages/cms-admin/tsconfig.json

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: CMS core tests
        run: cd packages/cms && npx vitest run

      - name: CMS admin tests
        run: cd packages/cms-admin && npx vitest run

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd packages/cms-admin && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd packages/cms-admin && npx playwright test
        env:
          CMS_JWT_SECRET: ${{ secrets.CMS_JWT_SECRET }}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # cms-admin imports `@webhouse/cms` (workspace package). Without
      # building the workspace deps first, jiti resolves the source tree
      # but tsc can't find the types entrypoint declared in package.json
      # #types — every @webhouse/cms import becomes "Cannot find module"
      # and triggers cascading TS7006 (implicit any) errors.
      - name: Build workspace deps so cms-admin typecheck can resolve them
        run: pnpm build --filter='!@webhouse/cms-admin' --filter='!@webhouse/cms-example-blog'

      - name: Type-check cms
        run: cd packages/cms && npx tsc --noEmit

      - name: Type-check cms-admin
        run: npx tsc --noEmit --project packages/cms-admin/tsconfig.json

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Same workspace-build requirement as typecheck — vitest also
      # resolves @webhouse/cms types when running cms-admin tests.
      - name: Build workspace deps
        run: pnpm build --filter='!@webhouse/cms-admin' --filter='!@webhouse/cms-example-blog'

      - name: CMS core tests
        run: cd packages/cms && npx vitest run

      # cms-admin has 21 pre-existing failures in webauthn/totp/push-store
      # tests (test-fixture data-dir resolution issue, tracked separately).
      # Don't block CI on it; same continue-on-error pattern as
      # _release-build.yml.
      - name: CMS admin tests (non-blocking, see TODO)
        continue-on-error: true
        run: cd packages/cms-admin && npx vitest run

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd packages/cms-admin && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd packages/cms-admin && npx playwright test
        env:
          CMS_JWT_SECRET: ${{ secrets.CMS_JWT_SECRET }}

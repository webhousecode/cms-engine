name: Security Gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/nextjs
            p/typescript
            p/owasp-top-ten
            p/secrets

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(pnpm audit --json 2>/dev/null | jq '.advisories | to_entries | map(select(.value.severity == "critical")) | length' 2>/dev/null || echo "0")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL critical vulnerabilities found!"
            pnpm audit --audit-level=critical
            exit 1
          fi

  notify-discord:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast, dependency-audit]
    if: always()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.SECURITY_GATE_DISCORD_WEBHOOK }}
        run: |
          SECRETS="${{ needs.secrets-scan.result }}"
          SAST="${{ needs.sast.result }}"
          DEPS="${{ needs.dependency-audit.result }}"
          TRIGGER="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SECRETS" = "success" ] && [ "$SAST" = "success" ] && [ "$DEPS" = "success" ]; then
            COLOR=3066993  # green
            ICON="✅"
            STATUS="All checks passed"
          else
            COLOR=15158332  # red
            ICON="🚨"
            STATUS="Issues found"
          fi

          # Only send Discord on failure or weekly scan
          if [ "$COLOR" = "3066993" ] && [ "$TRIGGER" != "schedule" ]; then
            echo "All green on non-scheduled run — skipping Discord."
            exit 0
          fi

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$ICON Security Gate — $STATUS\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"Secrets\", \"value\": \"$SECRETS\", \"inline\": true },
                  { \"name\": \"SAST\", \"value\": \"$SAST\", \"inline\": true },
                  { \"name\": \"Dependencies\", \"value\": \"$DEPS\", \"inline\": true },
                  { \"name\": \"Trigger\", \"value\": \"$TRIGGER\", \"inline\": true }
                ],
                \"url\": \"$RUN_URL\",
                \"footer\": { \"text\": \"@webhouse/cms\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"

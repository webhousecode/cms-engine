<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 11px; font-weight: 400; fill: #555; }

      /* c-gray */
      .c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #2C2C2A; }
      .c-gray .ts { fill: #5F5E5A; }

      /* c-teal */
      .c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }

      /* c-blue */
      .c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }

      /* c-coral */
      .c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .c-coral .ts { fill: #993C1D; }

      /* c-green */
      .c-green rect, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .c-green .ts { fill: #3B6D11; }

      /* c-amber */
      .c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }

      /* c-purple */
      .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }

      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- LEFT SIDE: public read-only consumers -->
  <g class="c-gray">
    <rect x="20" y="30" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="85" y="55" text-anchor="middle">Web research agent</text>
  </g>
  <g class="c-gray">
    <rect x="20" y="84" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="85" y="109" text-anchor="middle">Perplexity / GPT</text>
  </g>
  <g class="c-gray">
    <rect x="20" y="138" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="85" y="163" text-anchor="middle">Claude (web mode)</text>
  </g>

  <!-- Arrows to mcp-client -->
  <line x1="150" y1="50" x2="196" y2="110" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
  <line x1="150" y1="104" x2="196" y2="130" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
  <line x1="150" y1="158" x2="196" y2="150" class="arr" marker-end="url(#arrow)" stroke="#888780"/>

  <!-- cms-mcp-client box -->
  <g class="c-teal">
    <rect x="196" y="60" width="168" height="160" rx="10" stroke-width="0.5"/>
    <text class="th" x="280" y="90" text-anchor="middle">@webhouse/</text>
    <text class="th" x="280" y="110" text-anchor="middle">cms-mcp-client</text>
    <text class="ts" x="280" y="132" text-anchor="middle">READ ONLY · no auth</text>
    <text class="ts" x="280" y="150" text-anchor="middle">per-site endpoint</text>
    <text class="ts" x="280" y="168" text-anchor="middle">yoursite.com/mcp</text>
    <text class="ts" x="280" y="188" text-anchor="middle">SSE transport</text>
  </g>

  <!-- Public hint -->
  <text class="ts" x="280" y="232" text-anchor="middle" font-style="italic">åben for alle agenter</text>

  <!-- Tools for client -->
  <g class="c-green">
    <rect x="196" y="242" width="168" height="148" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="264" text-anchor="middle">Tools (public)</text>
    <text class="ts" x="280" y="284" text-anchor="middle">search_content</text>
    <text class="ts" x="280" y="302" text-anchor="middle">get_page</text>
    <text class="ts" x="280" y="320" text-anchor="middle">list_collection</text>
    <text class="ts" x="280" y="338" text-anchor="middle">get_site_summary</text>
    <text class="ts" x="280" y="356" text-anchor="middle">get_schema</text>
    <text class="ts" x="280" y="374" text-anchor="middle">export_all</text>
  </g>

  <!-- Arrow client → CMS -->
  <line x1="280" y1="390" x2="280" y2="440" class="arr" marker-end="url(#arrow)"/>

  <!-- RIGHT SIDE: auth write consumers -->
  <g class="c-purple">
    <rect x="530" y="30" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="595" y="55" text-anchor="middle">Claude iOS app</text>
  </g>
  <g class="c-purple">
    <rect x="530" y="84" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="595" y="109" text-anchor="middle">Claude.ai</text>
  </g>
  <g class="c-purple">
    <rect x="530" y="138" width="130" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="595" y="163" text-anchor="middle">Cursor / CC</text>
  </g>

  <!-- Arrows from mcp-server -->
  <line x1="530" y1="50" x2="484" y2="110" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>
  <line x1="530" y1="104" x2="484" y2="130" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>
  <line x1="530" y1="158" x2="484" y2="150" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>

  <!-- cms-mcp-server box -->
  <g class="c-coral">
    <rect x="316" y="60" width="168" height="160" rx="10" stroke-width="0.5"/>
    <text class="th" x="400" y="90" text-anchor="middle">@webhouse/</text>
    <text class="th" x="400" y="110" text-anchor="middle">cms-mcp-server</text>
    <text class="ts" x="400" y="132" text-anchor="middle">READ + WRITE · auth</text>
    <text class="ts" x="400" y="150" text-anchor="middle">API key / OAuth</text>
    <text class="ts" x="400" y="168" text-anchor="middle">cms.yoursite.com/mcp</text>
    <text class="ts" x="400" y="188" text-anchor="middle">SSE + Streamable HTTP</text>
  </g>

  <!-- Auth hint -->
  <text class="ts" x="400" y="232" text-anchor="middle" font-style="italic">kræver bearer token</text>

  <!-- Tools for server -->
  <g class="c-amber">
    <rect x="316" y="242" width="168" height="196" rx="8" stroke-width="0.5"/>
    <text class="th" x="400" y="264" text-anchor="middle">Tools (authed)</text>
    <text class="ts" x="400" y="286" text-anchor="middle">+ alle public tools</text>
    <text class="ts" x="400" y="304" text-anchor="middle">create_document</text>
    <text class="ts" x="400" y="322" text-anchor="middle">update_document</text>
    <text class="ts" x="400" y="340" text-anchor="middle">publish / unpublish</text>
    <text class="ts" x="400" y="358" text-anchor="middle">generate_with_ai</text>
    <text class="ts" x="400" y="376" text-anchor="middle">upload_media</text>
    <text class="ts" x="400" y="394" text-anchor="middle">manage_drafts</text>
    <text class="ts" x="400" y="412" text-anchor="middle">trigger_build</text>
  </g>

  <!-- Arrow server → CMS -->
  <line x1="400" y1="438" x2="400" y2="450" class="arr" marker-end="url(#arrow)"/>

  <!-- CMS Engine at bottom -->
  <g class="c-blue">
    <rect x="130" y="450" width="420" height="86" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="478" text-anchor="middle">@webhouse/cms — core engine</text>
    <text class="ts" x="340" y="498" text-anchor="middle">Content Layer · AI Layer · Build Pipeline · Storage</text>
    <text class="ts" x="340" y="516" text-anchor="middle">begge MCP-pakker er adapters på core engine API'et</text>
  </g>
</svg>

<svg width="100%" viewBox="0 0 680 540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Agent on left -->
  <g class="node c-purple" onclick="">
    <rect x="20" y="220" width="80" height="100" rx="10" stroke-width="0.5"/>
    <text class="th" x="60" y="258" text-anchor="middle">AI</text>
    <text class="th" x="60" y="278" text-anchor="middle">Agent</text>
    <text class="ts" x="60" y="298" text-anchor="middle">web research</text>
  </g>
  <line x1="100" y1="270" x2="130" y2="270" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>

  <!-- Layer 1: Discovery -->
  <g class="c-teal">
    <rect x="130" y="30" width="520" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="58" text-anchor="middle">1 · Discovery</text>
    <text class="ts" x="390" y="78" text-anchor="middle">robots.txt  ·  llms.txt  ·  /.well-known/ai-plugin.json  ·  sitemap.xml</text>
  </g>

  <!-- Layer 2: Content index -->
  <g class="c-blue">
    <rect x="130" y="114" width="520" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="142" text-anchor="middle">2 · Content index</text>
    <text class="ts" x="390" y="162" text-anchor="middle">llms-full.txt  ·  JSON Feed  ·  RSS/Atom  ·  /ai-index.json</text>
  </g>

  <!-- Layer 3: Semantic -->
  <g class="c-amber">
    <rect x="130" y="198" width="520" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="226" text-anchor="middle">3 · Semantic markup</text>
    <text class="ts" x="390" y="246" text-anchor="middle">JSON-LD Schema.org  ·  OpenGraph  ·  semantic HTML5  ·  hreflang</text>
  </g>

  <!-- Layer 4: API -->
  <g class="c-coral">
    <rect x="130" y="282" width="520" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="310" text-anchor="middle">4 · Programmatic API</text>
    <text class="ts" x="390" y="330" text-anchor="middle">REST /api/content  ·  GraphQL  ·  OpenAPI spec  ·  Markdown export</text>
  </g>

  <!-- Layer 5: MCP -->
  <g class="c-purple">
    <rect x="130" y="366" width="520" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="394" text-anchor="middle">5 · MCP Server  <tspan font-size="11">(protocol-native)</tspan></text>
    <text class="ts" x="390" y="414" text-anchor="middle">Model Context Protocol  ·  tools: search, get, list, export</text>
  </g>

  <!-- CMS engine box at bottom -->
  <g class="c-gray">
    <rect x="130" y="454" width="520" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="390" y="480" text-anchor="middle">@webhouse/cms — build pipeline</text>
    <text class="ts" x="390" y="498" text-anchor="middle">auto-genererer alt ovenstående ved hvert build</text>
  </g>

  <!-- Vertical arrows between layers -->
  <line x1="390" y1="98" x2="390" y2="112" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="182" x2="390" y2="196" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="266" x2="390" y2="280" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="350" x2="390" y2="364" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="434" x2="390" y2="452" class="arr" marker-end="url(#arrow)"/>

  <!-- Complexity label -->
  <text class="ts" x="118" y="66" text-anchor="end" style="font-style:italic">simpel</text>
  <text class="ts" x="118" y="400" text-anchor="end" style="font-style:italic">avanceret</text>
  <line x1="114" y1="75" x2="114" y2="420" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <path d="M110 415L114 425L118 415" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
</svg>